<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title or "Financeiro Academia" }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/app.css') }}" rel="stylesheet">
  </head>
  <body>
    <nav class="navbar navbar-expand-lg border-bottom bg-white">
      <div class="container-fluid">
        <a class="navbar-brand fw-semibold" href="{{ url_for('main.dashboard') }}">Financeiro Academia</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="nav">
          <div class="navbar-nav">
            <a class="nav-link" href="{{ url_for('students.index') }}">Alunos</a>
            <a class="nav-link" href="{{ url_for('finance.index') }}">Financeiro</a>
            <a class="nav-link" href="{{ url_for('finance.generate') }}">Gerar mensalidades</a>
          </div>
        </div>
      </div>
    </nav>

    <main class="container-fluid py-4">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
              {{ message }}
              <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
          {% endfor %}
        {% endif %}
      {% endwith %}
      {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      async function fetchCep(input) {
        const cep = input.value.replace(/\D/g, "");
        if (cep.length !== 8) return;
        const response = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
        const data = await response.json();
        if (data.erro) return;
        document.querySelector("[name=street]").value = data.logradouro || "";
        document.querySelector("[name=district]").value = data.bairro || "";
        document.querySelector("[name=city]").value = data.localidade || "";
        document.querySelector("[name=state]").value = data.uf || "";
      }
    </script>
  </body>
</html>
